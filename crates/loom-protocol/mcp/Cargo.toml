[package]
edition = "2024"
license = "Apache-2.0"
name = "loom-mcp"
version = "0.2.0"

[lib]
name = "loom_mcp"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
async-channel = { workspace = true }
loom-async-utils = { workspace = true }
loom-config = { workspace = true }
loom-exec-server = { workspace = true }
loom-protocol = { workspace = true }
loom-rmcp-client = { workspace = true }
loom-plugins = { workspace = true }
loom-shim-stubs = { workspace = true }
futures = { workspace = true }
regex-lite = { workspace = true }
rmcp = { workspace = true, default-features = false, features = ["base64", "macros", "schemars", "server"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha1 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["io-util", "macros", "rt-multi-thread"] }
tokio-util = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
rmcp = { workspace = true, default-features = false, features = ["base64", "macros", "schemars", "server"] }
tempfile = { workspace = true }
