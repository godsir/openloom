[package]
edition = "2024"
license = "Apache-2.0"
name = "loom-tools"
version = "0.2.0"

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
loom-app-server-protocol = { workspace = true }
loom-shim-stubs = { workspace = true }
loom-features = { workspace = true }
loom-protocol = { workspace = true }
loom-absolute-path = { workspace = true }
loom-string = { workspace = true }
jsonptr = { workspace = true }
rmcp = { workspace = true, default-features = false, features = [
    "base64",
    "macros",
    "schemars",
    "server",
] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
urlencoding = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }

[lib]
doctest = false
