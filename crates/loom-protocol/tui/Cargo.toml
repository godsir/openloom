[package]
name = "loom-tui"
version.workspace = true
edition.workspace = true
license.workspace = true
autobins = false

[[bin]]
name = "loom-tui"
path = "src/main.rs"

[[bin]]
name = "md-events"
path = "src/bin/md-events.rs"

[lib]
name = "loom_tui"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
clap = { workspace = true, features = ["derive"] }
loom-ansi-escape = { workspace = true }
loom-app-server-client = { workspace = true }
loom-app-server-protocol = { workspace = true }
loom-arg0 = { workspace = true }
loom-install-context = { workspace = true }
loom-chatgpt = { workspace = true }
loom-config = { workspace = true }
loom-core-plugins = { workspace = true }
loom-core-skills = { workspace = true }
loom-exec-server = { workspace = true }
loom-features = { workspace = true }
loom-file-search = { workspace = true }
loom-git-utils = { workspace = true }
loom-protocol = { workspace = true }
loom-sandboxing = { workspace = true }
loom-shell-command = { workspace = true }
loom-terminal-detection = { workspace = true }
loom-approval-presets = { workspace = true }
loom-absolute-path = { workspace = true }
loom-cli-utils = { workspace = true }
loom-elapsed = { workspace = true }
loom-fuzzy-match = { workspace = true }
loom-home-dir = { workspace = true }
loom-oss = { workspace = true }
loom-path-utils = { workspace = true }
loom-plugins = { workspace = true }
loom-sandbox-summary = { workspace = true }
loom-sleep-inhibitor = { workspace = true }
loom-string = { workspace = true }
loom-tui-stubs = { workspace = true }
loom-otel-stub = { workspace = true }
color-eyre = { workspace = true }
crossterm = { workspace = true, features = ["bracketed-paste", "event-stream"] }
derive_more = { workspace = true, features = ["is_variant"] }
diffy = { workspace = true }
dirs = { workspace = true }
dunce = { workspace = true }
image = { workspace = true, features = ["jpeg", "png", "gif", "webp"] }
itertools = { workspace = true }
lazy_static = { workspace = true }
pathdiff = { workspace = true }
pulldown-cmark = { workspace = true }
rand = { workspace = true }
ratatui = { workspace = true, features = [
    "scrolling-regions",
    "unstable-backend-writer",
    "unstable-rendered-line-info",
    "unstable-widget-ref",
] }
ratatui-macros = { workspace = true }
regex-lite = { workspace = true }
reqwest = { workspace = true, features = ["blocking", "json"] }
rmcp = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["preserve_order"] }
sha2 = { workspace = true }
shlex = { workspace = true }
strum = { workspace = true }
strum_macros = { workspace = true }
supports-color = { workspace = true }
tempfile = { workspace = true }
textwrap = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
    "test-util",
    "time",
] }
tokio-stream = { workspace = true, features = ["sync"] }
toml = { workspace = true }
tracing = { workspace = true, features = ["log"] }
tracing-appender = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
syntect = "5"
two-face = { version = "0.5", default-features = false, features = ["syntect-default-onig"] }
unicode-segmentation = { workspace = true }
unicode-width = { workspace = true }
url = { workspace = true }
urlencoding = { workspace = true }
webbrowser = { workspace = true }
uuid = { workspace = true }
tokio-util = { workspace = true, features = ["time"] }

[target.'cfg(not(target_os = "linux"))'.dependencies]
cpal = "0.15"

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
which = { workspace = true }
windows-sys = { version = "0.52", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Storage_FileSystem",
    "Win32_System_Console",
    "Win32_System_IO",
    "Win32_System_Pipes",
    "Win32_System_Threading",
] }
winsplit = "0.1"

# Clipboard support via `arboard` is not available on Android/Termux.
# Only include it for non-Android targets so the crate builds on Android.
[target.'cfg(not(target_os = "android"))'.dependencies]
arboard = { workspace = true }

[dev-dependencies]
loom-cli-utils = { workspace = true }
loom-mcp = { workspace = true }
assert_matches = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
insta = { workspace = true }
pretty_assertions = { workspace = true }
rand = { workspace = true }
serial_test = { workspace = true }
uuid = { workspace = true }
wiremock = { workspace = true }
