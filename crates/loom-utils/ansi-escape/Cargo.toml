[package]
name = "loom-ansi-escape"
version = "0.2.0"
edition = "2024"
license = "Apache-2.0"

[lib]
name = "loom_ansi_escape"
path = "src/lib.rs"
test = false
doctest = false

[lints]
workspace = true

[dependencies]
ansi-to-tui = { workspace = true }
ratatui = { workspace = true, features = [
    "unstable-rendered-line-info",
    "unstable-widget-ref",
] }
tracing = { workspace = true, features = ["log"] }
