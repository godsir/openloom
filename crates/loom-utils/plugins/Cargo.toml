
[package]
edition = "2024"
license = "Apache-2.0"
name = "loom-plugins"
version = "0.2.0"

[lib]
doctest = false
name = "loom_plugins"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
loom-exec-server = { workspace = true }
loom-shim-stubs = { workspace = true }
loom-absolute-path = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
