[package]
name = "loom-cli"
version = "0.4.1"
edition = "2024"
description = "CLI entry point for openLoom v2 �?serve, chat demo, doctor"

[[bin]]
name = "loom"
path = "src/main.rs"

[dependencies]
loom-types = { path = "../loom-types" }
loom-core = { path = "../loom-core" }
loom-server = { path = "../loom-server" }
loom-inference = { path = "../loom-inference" }
loom-memory = { path = "../loom-memory", features = ["sqlite-vec"] }
loom-mcp = { path = "../loom-mcp" }
loom-skills = { path = "../loom-skills" }

loom-bridge = { path = "../loom-bridge" }
rusqlite = "0.32"
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "signal"] }
tokio-util = { workspace = true }
ctrlc = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.9"
ratatui = "0.29"
crossterm = "0.28"
pulldown-cmark = { version = "0.12", default-features = false, features = ["html"] }
