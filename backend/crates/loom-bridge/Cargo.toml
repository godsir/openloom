[package]
name = "loom-bridge"
version = "0.2.20"
edition = "2024"
description = "Bridge system for openLoom v2 �?external messaging platform adapters"

[dependencies]
loom-types = { path = "../loom-types" }
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", features = ["json"] }
rusqlite = "0.32"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "sync", "macros", "time"] }
tracing = "0.1"
