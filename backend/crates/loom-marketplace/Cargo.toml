[package]
name = "loom-marketplace"
version = "0.2.20"
edition = "2024"
description = "Plugin marketplace for openLoom �?catalog, install, uninstall"

[dependencies]
loom-plugins = { path = "../loom-plugins" }
tokio = { version = "1", features = ["process"] }
anyhow = "1"
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { workspace = true, features = ["json"] }
dirs = "6"
toml = { workspace = true }
