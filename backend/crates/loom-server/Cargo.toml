[package]
name = "loom-server"
version = "0.4.1"
edition = "2024"
description = "HTTP/WebSocket server for openLoom v2 �?Axum routes, JSON-RPC dispatch, SSE"

[dependencies]
loom-types = { path = "../loom-types" }
loom-core = { path = "../loom-core" }
loom-inference = { path = "../loom-inference" }
loom-mcp = { path = "../loom-mcp" }
loom-skills = { path = "../loom-skills" }
loom-lsp = { path = "../loom-lsp" }
loom-bridge = { path = "../loom-bridge" }
loom-cron = { path = "../loom-cron" }
loom-memory = { path = "../loom-memory" }
loom-import = { path = "../loom-import" }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "signal"] }
tokio-util = { workspace = true }
anyhow = "1"
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v7"] }
chrono = { version = "0.4", features = ["serde"] }
axum = { version = "0.7", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }
futures = "0.3"
reqwest = { version = "0.12", features = ["json"] }
zip = "2"
urlencoding = "2"
dirs = "6"
base64 = { workspace = true }
# Root declares keyring with default-features = false and NO backend, so a
# platform backend feature must be enabled here or it links nothing usable.
# windows-native (Windows Credential Manager), apple-native (macOS Keychain),
# sync-secret-service (Linux Secret Service via dbus). Each is gated behind a
# target-specific optional dep, so only the relevant backend activates per OS.
keyring = { workspace = true, features = ["windows-native", "apple-native", "sync-secret-service"] }
