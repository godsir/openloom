name = "github"
version = "1.0.0"
description = "GitHub integration — manage issues, PRs, repositories, and code search directly from loom. Requires GitHub CLI (gh) or a GitHub personal access token."

[[mcp_servers]]
name = "github"
transport = "stdio"
command = "npx"
args = ["-y", "@anthropic/github-mcp"]

[mcp_servers.env]
GITHUB_PERSONAL_ACCESS_TOKEN = ""
