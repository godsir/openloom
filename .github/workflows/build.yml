name: Beta Build

on:
  push:
    branches: [main]
    tags-ignore: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set beta version
        shell: pwsh
        run: |
          $pkg = Get-Content frontend/package.json -Raw | ConvertFrom-Json
          $pkg.version = "$($pkg.version)-beta.${{ github.run_number }}"
          $pkg | ConvertTo-Json -Depth 32 | Set-Content frontend/package.json -Encoding utf8
          Write-Host "Beta version: $($pkg.version)"

      - name: Build backend
        run: cargo build -p loom-cli --release

      - name: Build & package frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
          npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
