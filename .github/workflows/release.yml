name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            engine_binary: loom.exe
            artifact: windows-release
          - name: macOS
            os: macos-latest
            engine_binary: loom
            artifact: macos-release
          - name: Linux
            os: ubuntu-latest
            engine_binary: loom
            artifact: linux-release

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Build backend
        run: cargo build -p loom-cli --release

      - name: Configure macOS code signing
        if: matrix.name == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$MACOS_CERTIFICATE" ]; then
            echo "CSC_LINK=$MACOS_CERTIFICATE" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$MACOS_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Build Electron package and updater metadata
        working-directory: frontend
        env:
          ENGINE_BINARY: ${{ matrix.engine_binary }}
        run: |
          npm ci
          npm run package:updater

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            frontend/dist/*.exe
            frontend/dist/*.exe.blockmap
            frontend/dist/*.dmg
            frontend/dist/*.zip
            frontend/dist/*.zip.blockmap
            frontend/dist/*.AppImage
            frontend/dist/*.AppImage.blockmap
            frontend/dist/latest*.yml
            frontend/dist/*beta*.yml
          if-no-files-found: error

  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
