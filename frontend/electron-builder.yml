appId: com.openloom.app
productName: openLoom
artifactName: ${productName}.Setup.${version}.${ext}
directories:
  output: dist
  buildResources: resources
extraResources:
  - from: src/asset/
    to: .
    filter:
      - icon.ico
      - icon.png
  - from: ../target/release/loom.exe
    to: engine/loom.exe
  - from: ../resources/builtin
    to: builtin
win:
  target: nsis
  icon: src/asset/icon.ico
  artifactName: ${productName}.Setup.${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: godsir
  repo: openloom
