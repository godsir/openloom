appId: com.openloom.app
productName: openLoom
artifactName: ${productName}.Setup.${version}.${ext}
directories:
  output: dist
  buildResources: resources
extraResources:
  - from: ../target/release/loom.exe
    to: engine/loom.exe
win:
  target: nsis
  icon: resources/icon.ico
  artifactName: ${productName}.Setup.${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
