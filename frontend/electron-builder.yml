appId: com.openloom.app
productName: openLoom
directories:
  output: dist
  buildResources: resources
extraResources:
  - from: src/asset/
    to: .
    filter:
      - icon.ico
      - icon.png
  - from: ../target/release/loom.exe
    to: engine/loom.exe
  - from: ../resources/builtin
    to: builtin
win:
  icon: src/asset/icon.ico
publish:
  provider: github
  owner: godsir
  repo: openloom
