appId: com.openloom.app
productName: openLoom
electronDist: ./node_modules/electron/dist
files:
  - "!scripts/**"
  - "!dist/**"
  - "!src/**"
  - "!*.config.ts"
  - "!tsconfig*.json"
  - "!vitest.config.ts"
  - "!release-notes-*.md"
directories:
  output: dist
  buildResources: resources
extraResources:
  - from: src/asset/
    to: .
    filter:
      - icon.ico
      - icon.png
  # Rust binaries are produced natively in CI. Do not hard-code the Windows
  # suffix here: macOS/Linux packages contain `loom`, Windows contains
  # `loom.exe`.
  - from: ../target/release/${env.ENGINE_BINARY}
    to: engine/${env.ENGINE_BINARY}
  - from: ../resources/builtin
    to: builtin
win:
  icon: src/asset/icon.ico
  target:
    - nsis
mac:
  target:
    - dmg
    - zip
linux:
  target:
    - AppImage
publish:
  provider: github
  owner: godsir
  repo: openloom
