<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;user-select:none;pointer-events:none}
body{display:flex;align-items:flex-end;justify-content:center}
#wrapper{position:relative;display:flex;flex-direction:column;align-items:center;pointer-events:none}
canvas{display:block;flex-shrink:0;pointer-events:auto}

/* Bubble — positioned relative to wrapper, above canvas */
#bubble {
  display:block; opacity:0; position:absolute; bottom:calc(100% + 2px); left:50%;
  transform:translateX(-50%); background:rgba(0,0,0,0.82); color:#fff;
  padding:5px 10px; border-radius:8px; font-size:11px;
  white-space:nowrap; pointer-events:none; z-index:10;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  transition:opacity .25s ease;
}
#bubble::after {
  content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
  width:0; height:0; border:5px solid transparent;
  border-top-color:rgba(0,0,0,0.82);
}
#bubble.show{opacity:1}
</style>
</head><body>
<div id="wrapper">
  <div id="bubble"></div>

function getLocale() {
  try {
    var stored = localStorage.getItem('loom-locale');
    if (stored === 'zh-CN' || stored === 'en-US') return stored;
  } catch(e) {}
  return (document.documentElement.lang === 'en-US') ? 'en-US' : 'zh-CN';
}

var locale = getLocale();
var pack = TX[locale] || TX['zh-CN'];

function t(key) {
  return pack[key] != null ? pack[key] : key;
}

// Build translated arrays
var CLICK_LINES = [];
for (var ci = 0; ci < 35; ci++) { CLICK_LINES.push(t('pet.click.' + ci)); }

<script>
var FW = 192, FH = 208, COLS = 9, ROWS = 9, FRAMES = 6;
var PETDEX_STATES = {
  idle: 0, runRight: 1, runLeft: 2, wave: 3, jump: 4,
  failed: 5, wait: 6, dash: 7, inspect: 8
};
var PETDEX_ROW_FRAMES = { 0:6, 1:8, 2:8, 3:4, 4:5, 5:8, 6:6, 7:6, 8:6 };
var rowFrames = {};
var stateRow = {};
var currentState = 'idle', frame = 0, tick = 0;
var ticksPerFrame = 12;
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var sheet = new Image();

// --- Bubble ---
var bubble = document.getElementById('bubble');
var bubbleTimer = null;
function showBubble(text, duration) {
  bubble.textContent = text;
  bubble.classList.add('show');
  if (bubbleTimer) clearTimeout(bubbleTimer);
  if (duration) bubbleTimer = setTimeout(function(){ bubble.classList.remove('show') }, duration);
}
function hideBubble() {
  bubble.classList.remove('show');
  if (bubbleTimer) clearTimeout(bubbleTimer);
}

// --- Native context menu ---
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  hideBubble();
  window.petApi.showContextMenu(e.clientX, e.clientY);
});

// --- Handle commands from native menu (via preload IPC) ---
window.petApi.onCommand(function(cmd) {
  if (!cmd) return;
  if (cmd.startsWith('size:')) {
    var sz = cmd.split(':')[1];
    bc.postMessage({ type: 'cmd', cmd: 'size', value: sz });
  } else if (cmd === 'hide') {
    bc.postMessage({ type: 'cmd', cmd: 'toggle', value: false });
  } else if (cmd === 'close') {
    showBubble(t('pet.leaving'));
    setTimeout(function() {
      bc.postMessage({ type: 'cmd', cmd: 'toggle', value: false });
    }, 3000);
  } else if (cmd === 'dnd:on') {
    dndMode = true; resetUnlock(); showBubble(t('pet.goodbye'), 2000);
  } else if (cmd === 'dnd:off') {
    dndMode = false; resetUnlock(); showBubble(t('pet.back'), 2000);
  }
});

// --- Pet loading & animation ---
function loadPet(id) {
  var base = 'loom-pet://' + id + '/';
  fetch(base + 'pet.json')
    .then(function(r) { return r.json() })
    .then(function(meta) {
      FW = meta.frameWidth || 192;
      FH = meta.frameHeight || 208;
      COLS = meta.columns || 9;
      ROWS = meta.rows || 9;
      FRAMES = meta.framesPerRow || 6;
      if (meta.rowFrames) {
        rowFrames = {};
        Object.keys(meta.rowFrames).forEach(function(r) { rowFrames[parseInt(r)] = meta.rowFrames[r]; });
      } else {
        rowFrames = PETDEX_ROW_FRAMES;
      }
      if (meta.states) {
        stateRow = {};
        Object.keys(meta.states).forEach(function(k) { stateRow[k] = meta.states[k] });
      } else {
        stateRow = PETDEX_STATES;
      }
      canvas.width = FW;
      canvas.height = FH;
      canvas.style.width = FW + 'px';
      canvas.style.height = FH + 'px';
      sheet.src = base + (meta.spritesheetPath || 'spritesheet.webp');
    })
    .catch(function(e) { console.error('[pet] loadPet failed:', e) });
}

sheet.onload = function() {
  tick = 0; frame = 0;
};

function loop() {
  tick++;
  var row = stateRow[currentState] != null ? stateRow[currentState] : 0;
  var maxFrames = rowFrames[row] != null ? rowFrames[row] : FRAMES;
  if (tick % ticksPerFrame === 0) frame = (frame + 1) % maxFrames;
  var sx = (frame % COLS) * FW;
  var sy = row * FH;
  ctx.clearRect(0, 0, FW, FH);
  ctx.drawImage(sheet, sx, sy, FW, FH, 0, 0, FW, FH);
  requestAnimationFrame(loop);
}

function resize(size) {
  var w = Math.round(size);
  var h = Math.round(size * (FH / FW));
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
}

// --- State-to-bubble mapping ---
var STATE_BUBBLES = {
  wave: t('pet.replying'),
  dash: t('pet.working'),
  inspect: t('pet.checking'),
  jump: t('pet.done'),
  failed: t('pet.error'),
  wait: t('pet.waiting'),
  runRight: t('pet.coming'),
  runLeft: t('pet.leavingAction'),
};

// BroadcastChannel
var bc = new BroadcastChannel('pet');
bc.onmessage = function(e) {
  var d = e.data;
  if (!d || !d.type) return;
  if (d.type === 'state' && d.state) {
    if (stateRow[d.state] != null) {
      bumpActivity();
      currentState = d.state; frame = 0; tick = 0;
      var msg = d.bubble || STATE_BUBBLES[d.state] || '';
      if (msg) showBubble(msg, 2500);
      else hideBubble();
    }
  } else if (d.type === 'size' && d.size) {
    resize(d.size);
  } else if (d.type === 'pet' && d.petId) {
    loadPet(d.petId);
    showBubble(t('pet.switchPet'), 1500);
  } else if (d.type === 'bubble' && d.text) {
    bumpActivity();
    showBubble(d.text, d.duration || 2000);
  } else if (d.type === 'config') {
    if (d.idleInterval) { idleIntervalSec = d.idleInterval; bumpActivity(); }
    if (typeof d.dnd === 'boolean') { dndMode = d.dnd; resetUnlock(); }
    if (typeof d.breakInterval === 'number') { breakIntervalMin = d.breakInterval; lastBreakReminder = Date.now(); }
  }
};

// --- Manual drag (canvas only) with pixel hit-testing ---
var dragging = false, dragX = 0, dragY = 0;
var mouseIgnored = true; // matches initial window state
var lastHitCheck = 0;

function getPixelAlpha(e) {
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width / rect.width;
  var scaleY = canvas.height / rect.height;
  var cx = Math.floor((e.clientX - rect.left) * scaleX);
  var cy = Math.floor((e.clientY - rect.top) * scaleY);
  if (cx < 0 || cy < 0 || cx >= canvas.width || cy >= canvas.height) return 0;
  try {
    return ctx.getImageData(cx, cy, 1, 1).data[3];
  } catch (_) { return 0; }
}

function setMouseIgnored(v) {
  if (mouseIgnored === v) return;
  mouseIgnored = v;
  window.petApi.setIgnoreMouse(v);
}

canvas.addEventListener('mousemove', function(e) {
  if (dragging) return;
  var now = Date.now();
  if (now - lastHitCheck < 50) return;
  lastHitCheck = now;
  if (dndMode) {
    var alpha = getPixelAlpha(e);
    if (alpha >= 10) {
      if (!unlockHoverStart) {
        unlockHoverStart = now;
        unlockTimer = setTimeout(function() {
          unlockActive = true;
          setMouseIgnored(false);
          showBubble(t('pet.dndExit'), 0);
          unlockDismissTimer = setTimeout(resetUnlock, 5000);
        }, 2000);
      }
    } else {
      resetUnlock();
    }
  } else {
    setMouseIgnored(getPixelAlpha(e) < 10);
  }
});

canvas.addEventListener('mouseleave', function() {
  if (!dragging) { setMouseIgnored(true); resetUnlock(); }
});

// --- DnD unlock ---
var unlockHoverStart = 0;
var unlockActive = false;
var unlockTimer = null;
var unlockDismissTimer = null;

function resetUnlock() {
  unlockHoverStart = 0;
  unlockActive = false;
  if (unlockTimer) { clearTimeout(unlockTimer); unlockTimer = null; }
  if (unlockDismissTimer) { clearTimeout(unlockDismissTimer); unlockDismissTimer = null; }
  hideBubble();
  if (dndMode) setMouseIgnored(true);
}

function exitDnd() {
  dndMode = false;
  resetUnlock();
  window.petApi.setDnd(false);
}

canvas.addEventListener('click', function(e) {
  if (unlockActive) {
    e.stopPropagation();
    exitDnd();
  }
});

// --- Click vs drag ---
var startX = 0, startY = 0;

canvas.addEventListener('mousedown', function(e) {
  if (e.button === 0) { dragging = true; dragX = startX = e.screenX; dragY = startY = e.screenY; canvas.style.cursor='grabbing'; bumpActivity(); }
});
document.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var dx = e.screenX - dragX;
  var dy = e.screenY - dragY;
  if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
    window.petApi.moveWindow(dx, dy);
    dragX = e.screenX; dragY = e.screenY;
  }
});
var CLICK_STATES = ['wave', 'jump', 'runRight', 'runLeft', 'dash', 'inspect'];
var clickReturnTimer = null;

// --- Idle autonomous behavior ---
var IDLE_STATES = ['wave', 'jump', 'runRight', 'runLeft', 'inspect'];
var lastActivity = Date.now();
var nextIdleAt = lastActivity + 30000;
var idleTimer = null;

// --- Break reminder ---
var lastBreakReminder = Date.now();
var breakCheckInterval = null;

function checkBreakReminder() {
  if (!breakIntervalMin) return;
  if (Date.now() - lastBreakReminder > breakIntervalMin * 60000) {
    lastBreakReminder = Date.now();
    currentState = 'wave'; frame = 0; tick = 0;
    showBubble(t('pet.breakReminder'), 5000);
    if (clickReturnTimer) clearTimeout(clickReturnTimer);
    clickReturnTimer = setTimeout(function() { currentState = 'idle'; frame = 0; tick = 0; }, 3000);
  }
}

function startBreakTimer() {
  if (breakCheckInterval) return;
  breakCheckInterval = setInterval(checkBreakReminder, 30000);
}

function bumpActivity() {
  lastActivity = Date.now();
  nextIdleAt = lastActivity + idleIntervalSec * 1000;
}

function triggerIdle() {
  // 30% chance: follow cursor; 70%: in-place animation
  if (Math.random() < 0.3) {
    tryFollowCursor();
  } else {
    playIdleAnim();
  }
}

function playIdleAnim() {
  var st = IDLE_STATES[Math.floor(Math.random() * IDLE_STATES.length)];
  var line = IDLE_LINES[Math.floor(Math.random() * IDLE_LINES.length)];
  currentState = st; frame = 0; tick = 0;
  showBubble(line, 3000);
  if (clickReturnTimer) clearTimeout(clickReturnTimer);
  clickReturnTimer = setTimeout(function() { currentState = 'idle'; frame = 0; tick = 0; }, 2500);
  nextIdleAt = Date.now() + idleIntervalSec * 1000 * (0.75 + Math.random() * 0.5);
}

function tryFollowCursor() {
  window.petApi.getPositions().then(function(pos) {
    if (!pos) { playIdleAnim(); return; }
    // canvas is centered horizontally, at bottom vertically in the window
    var cx = pos.winX + pos.winW / 2;
    var cy = pos.winY + pos.winH - canvas.clientHeight / 2;
    var dx = pos.cursorX - cx;
    var dy = pos.cursorY - cy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 60) { playIdleAnim(); return; }
    // Smooth movement: 3-5s (60-100 steps at 50ms)
    var steps = 60 + Math.floor(Math.random() * 40);
    var stepDx = Math.round(dx / steps);
    var stepDy = Math.round(dy / steps);
    if (stepDx === 0 && stepDy === 0) { playIdleAnim(); return; }
    var line = IDLE_LINES[Math.floor(Math.random() * IDLE_LINES.length)];
    showBubble(line, 2500);
    currentState = dx > 0 ? 'runRight' : 'runLeft'; frame = 0; tick = 0;
    var s = 0;
    var moveTimer = setInterval(function() {
      s++;
      if (s >= steps) {
        clearInterval(moveTimer);
        currentState = 'idle'; frame = 0; tick = 0;
        nextIdleAt = Date.now() + idleIntervalSec * 1000 * (0.75 + Math.random() * 0.5);
        return;
      }
      window.petApi.moveWindow(stepDx, stepDy);
    }, 50);
  }).catch(function() { playIdleAnim(); });
}

function startIdleTimer() {
  if (idleTimer) return;
  idleTimer = setInterval(function() {
    if (currentState !== 'idle') return;
    if (dndMode) return;
    if (Date.now() >= nextIdleAt) triggerIdle();
  }, 8000);
}

document.addEventListener('mouseup', function() {
  if (dragging && Math.abs(dragX - startX) <= 3 && Math.abs(dragY - startY) <= 3 && !(dndMode && unlockActive)) {
    bumpActivity();
    lastBreakReminder = Date.now();
    var line = CLICK_LINES[Math.floor(Math.random() * CLICK_LINES.length)];
    showBubble(line, 3000);
    var st = CLICK_STATES[Math.floor(Math.random() * CLICK_STATES.length)];
    currentState = st; frame = 0; tick = 0;
    if (clickReturnTimer) clearTimeout(clickReturnTimer);
    clickReturnTimer = setTimeout(function() { currentState = 'idle'; frame = 0; tick = 0; }, 2500);
  }
  canvas.style.cursor='';
  dragging = false;
});

// Boot
var hash = location.hash.slice(1) || 'boba&128';
var parts = hash.split('&');
var defaultPet = parts[0] || 'boba';
var defaultSize = parseInt(parts[1]) || 128;
var idleIntervalSec = parseInt(parts[2]) || 30;
var dndMode = parts[3] === '1';
var breakIntervalMin = parseInt(parts[4]) || 0;
loadPet(defaultPet);
sheet.onload = function() {
  resize(defaultSize);
  tick = 0; frame = 0;
};
requestAnimationFrame(loop);
startIdleTimer();
startBreakTimer();
</script>
