[router]
keyword_threshold = 0.85
fallback_threshold = 0.7

[server]
host = "127.0.0.1"

[storage]
# 自定义数据目录（模型、数据库等），不设置则使用系统默认
# Windows: %APPDATA%/openLoom
# macOS:   ~/Library/Application Support/openLoom
# Linux:   ~/.local/share/openLoom
# data_dir = "D:/openLoomData"

[logging]
level = "INFO"
log_content = false

[cache]
block_size = 1024
max_blocks = 32
total_budget_mb = 5120

[agent]
max_iterations = 3
timeout_secs = 120

[persona]
top_n = 5
recency_decay_days = 30

[rate_limit]
min_interval_ms = 100
