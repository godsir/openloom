# ═══════════════════════════════════════════════════════════
# 路由配置
# ═══════════════════════════════════════════════════════════

[router]
keyword_threshold = 0.85    # 关键词匹配置信度阈值
fallback_threshold = 0.7    # 降级到云端的阈值

# ═══════════════════════════════════════════════════════════
# Agent 配置
# ═══════════════════════════════════════════════════════════

[agent]
max_iterations = 50          # Agent Loop 最大工具调用轮次
timeout_secs = 120          # 单次 Agent Loop 超时

# ═══════════════════════════════════════════════════════════
# 存储
# ═══════════════════════════════════════════════════════════

[storage]
# 自定义数据目录,不设置则使用系统默认
# data_dir = "D:/openLoomData"

# ═══════════════════════════════════════════════════════════
# 其他
# ═══════════════════════════════════════════════════════════

[rate_limit]
min_interval_ms = 100       # 请求最小间隔 (毫秒)

[persona]
top_n = 5                   # Persona 最多取前 N 个认知
recency_decay_days = 30     # 认知时间衰减天数

[server]
host = "127.0.0.1"

[logging]
level = "INFO"
log_content = false         # 不记录用户对话内容

[cache]
block_size = 1024
max_blocks = 32
total_budget_mb = 5120
