# openLoom 配置文件
# 位置: %APPDATA%/openLoom/config.toml (Windows)
#       ~/Library/Application Support/openLoom/config.toml (macOS)
#       ~/.local/share/openLoom/config.toml (Linux)

# ═══════════════════════════════════════════════════════════
# 模型配置 (可配多个，系统按优先级自动选择)
# ═══════════════════════════════════════════════════════════

# ── 本地推理 (LM Studio / Ollama) ──────────────────────────
# 用于: 意图分类、简单问答、离线对话
# 优先级: 当 Router 判定为简单请求时使用本地模型

[[models]]
name = "lmstudio"
backend = "LmStudio"
model = "qwen2.5-7b-instruct"
context_size = 32000
# base_url = "http://localhost:1234/v1"   # LM Studio 默认端口

# [[models]]
# name = "ollama"
# backend = "Ollama"
# model = "qwen2.5:7b"
# context_size = 32000
# base_url = "http://localhost:11434/v1"  # Ollama 默认端口

# ── 云端模型 ──────────────────────────────────────────────
# 用于: 复杂对话、Agent Loop 推理、工具调用
# 优先级: 当 Router 判定为复杂请求或需要工具时使用云端

